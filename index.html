<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Enmanuel Osuna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header class="usercard">
            <img src="student-img.jpeg" alt="student profile">
            <h1 class="name">Enmanuel Osuna</h1>
            <h3 class="email">osuna.uni@gmail.com</h3>
        </header>
        <article class="cards-cont">
            <figure class="card">
                <div class="shape">
                    <div class="diamond"></div>
                </div>
            </figure>

            <figure class="card">
                <div class="shape">
                    <div class="circle-heart-left"></div>
                    <div class="circle-heart-right"></div>
                    <div class="heart-bottom"></div>
                </div>
            </figure>

            <figure class="card">
                <div class="shape">
                    <div class="circle-spade-left"></div>
                    <div class="circle-spade-right"></div>
                    <div class="spade-top"></div>
                    <div class="black-bottom"></div>
                </div>
            </figure>

            <figure class="card">
                <div class="shape">
                    <div class="circle-club-left"></div>
                    <div class="circle-club-right"></div>
                    <div class="club-top"></div>                
                    <div class="black-bottom"></div>
                </div>
            </figure>
        </article>
    </main>
</body>
</html>
